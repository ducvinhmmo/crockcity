<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Crockcity MMO </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- KHUNG LỚN CHỨA TOÀN BỘ GIAO DIỆN -->
    <div class="app-container">

        <!-- 1. THANH SIDEBAR PHÍA BÊN TRÁI -->
        <aside class="sidebar">
            <div class="logo">
                <h2>Crockcity VIP</h2>
            </div>
            
            <!-- Khu vực hiển thị số dư của User -->
            <div class="user-status-box">
                <p>Xin chào, <span id="username-display">Loading...</span></p>
                <p class="balance-title">Số dư hiện tại:</p>
                <h3 id="balance-display">0 đ</h3>
            </div>

            <!-- Các mục Menu điều hướng dọc -->
            <nav class="sidebar-menu">
                <a href="#" class="active">🏠 Trang Chủ</a>
                <a href="#">📝 Danh Sách Nhiệm Vụ</a>
                <a href="#">🎡 Vòng Quay May Mắn</a>
                <a href="#">💳 Rút Tiền Về ATM</a>
            </nav>
        </aside>

        <!-- 2. KHU VỰC HIỂN THỊ NỘI DUNG CHÍNH PHÍA BÊN PHẢI -->
        <main class="main-content">
            
            <!-- Khu vực hiển thị link mời bạn bè (đã làm ở bước trước) -->
            <div class="referral-box">
                <h3>👥 Chương Trình Giới Thiệu Bạn Bè</h3>
                <p id="referrer-display">Người mời bạn: Đang tải...</p>
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <input type="text" id="ref-link-input" readonly>
                    <button onclick="copyRefLink()">Sao Chép</button>
                </div>
            </div>

            <!-- Khu vực chứa các nút bấm làm nhiệm vụ -->
            <div class="tasks-section">
                <h3>🎯 Nhiệm Vụ Kiếm Tiền Gốc 1.000đ</h3>
                <!-- Nút làm nhiệm vụ gọi hàm ăn chia 6:1:3 cộng riêng -->
                <button class="btn-task" onclick="completeTaskWithBonusRate('task_01', 1000)">Hoàn thành nhiệm vụ 1</button>
            </div>

        </main>

    </div>

    <script src="script.js"></script>
</body>
</html>
